<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Day Coffee Application</title>
    <link id="theme-stylesheet" rel="stylesheet" href="light-theme.css">
    <script defer src="app.js"></script>
</head>
<body>
    <header>
        <h1>One Day Coffee</h1>
        <button id="theme-toggle">Toggle Dark/Light Theme</button>
    </header>
    <main>
        <section id="sales-tracking">
            <h2>Sales Tracking</h2>
            <div id="sales-data"></div>
        </section>
        <section id="inventory-management">
            <h2>Inventory Management</h2>
            <div id="inventory-data"></div>
        </section>
        <section id="expense-logging">
            <h2>Expense Logging</h2>
            <div id="expense-data"></div>
        </section>
        <section id="staff-management">
            <h2>Staff Management</h2>
            <div id="staff-data"></div>
        </section>
        <section id="order-queue">
            <h2>Order Queue System</h2>
            <div id="order-queue-data"></div>
        </section>
        <section id="drink-photos">
            <h2>Drink Photos</h2>
            <div id="photo-gallery"></div>
        </section>
        <section id="quick-sell-buttons">
            <h2>Quick Sell Buttons</h2>
            <button class="quick-sell">Buy Coffee</button>
            <button class="quick-sell">Buy Tea</button>
        </section>
        <section id="charts">
            <h2>Line Charts</h2>
            <canvas id="sales-chart"></canvas>
        </section>
        <section id="calendar">
            <h2>Calendar View</h2>
            <div id="calendar-view"></div>
        </section>
        <section id="goal-tracking">
            <h2>Goal Tracking</h2>
            <div id="goal-data"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 One Day Coffee Application</p>
    </footer>
    <script>
        document.getElementById('theme-toggle').addEventListener('click', function() {
            const themeStylesheet = document.getElementById('theme-stylesheet');
            themeStylesheet.href = themeStylesheet.href.includes('light') ? 'dark-theme.css' : 'light-theme.css';
        });

        // LocalStorage persistence and other functionality...
    </script>
</body>
</html>
