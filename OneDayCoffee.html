<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Day Coffee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>One Day Coffee Application</h1>
        <button id="theme-toggle">Toggle Dark/Light Theme</button>
    </header>
    <main>
        <section id="costing-module">
            <h2>Costing Module</h2>
            <!-- Costing logic goes here -->
        </section>
        <section id="sales-tracking">
            <h2>Sales Tracking</h2>
            <!-- Sales tracking logic and charts go here -->
        </section>
        <section id="inventory-management">
            <h2>Inventory Management</h2>
            <!-- Inventory management logic goes here -->
        </section>
        <section id="expense-logging">
            <h2>Expense Logging</h2>
            <!-- Expense logging logic goes here -->
        </section>
        <section id="staff-management">
            <h2>Staff Management</h2>
            <!-- Staff management logic goes here -->
        </section>
        <section id="order-queue">
            <h2>Order Queue</h2>
            <!-- Order queue logic goes here -->
        </section>
        <section id="drink-photos">
            <h2>Drink Photos</h2>
            <!-- Photos upload and display logic goes here -->
        </section>
        <section id="recipe-duplication">
            <h2>Recipe Duplication</h2>
            <!-- Recipe duplication logic goes here -->
        </section>
        <section id="quick-sell-buttons">
            <h2>Quick-Sell Buttons</h2>
            <!-- Quick-sell buttons logic goes here -->
        </section>
        <section id="line-charts">
            <h2>Sales Trends</h2>
            <canvas id="salesChart"></canvas>
        </section>
        <section id="calendar-view">
            <h2>Calendar View</h2>
            <!-- Calendar view logic goes here -->
        </section>
        <section id="goal-tracking">
            <h2>Goal Tracking</h2>
            <!-- Goal tracking logic goes here -->
        </section>
    </main>
    <footer>
        <p>Current Date: <span id="current-date"></span></p>
        <script src="script.js"></script>
    </footer>
</body>
</html>

<script>
    // Theme Toggle Script
    const body = document.body;
    document.getElementById('theme-toggle').addEventListener('click', () => {
        body.classList.toggle('dark-theme');
    });

    // Local Storage Persistence
    window.onload = () => {
        const currentDate = new Date();
        document.getElementById('current-date').textContent = currentDate.toUTCString();
        const theme = localStorage.getItem('theme');
        if (theme) {
            body.classList.add(theme);
        }
    };
    window.onbeforeunload = () => {
        localStorage.setItem('theme', body.classList.contains('dark-theme') ? 'dark-theme' : '');
    };
</script>
